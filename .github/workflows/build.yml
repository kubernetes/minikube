name: build
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "go.mod"
      - "**.go"
      - "Makefile"
      - "!deploy/kicbase/**"
      - "!deploy/iso/**"
      - "!site/**"
env:
  GOPROXY: https://proxy.golang.org
  GO_VERSION: '1.26.5'
permissions:
  contents: read

jobs:
  build_minikube:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        timeout-minutes: 1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        timeout-minutes: 1
        with:
          go-version: ${{env.GO_VERSION}}
      - name: Download Dependencies
        timeout-minutes: 1
        run: go mod download
      - name: Build Binaries
        timeout-minutes: 32
        run: |
          make cross
          make e2e-cross
          cp -r test/integration/testdata ./out
          whoami
          echo github ref $GITHUB_REF
          echo workflow $GITHUB_WORKFLOW
          echo home $HOME
          echo event name $GITHUB_EVENT_NAME
          echo workspace $GITHUB_WORKSPACE
          echo "end of debug stuff"
          echo $(which jq)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        timeout-minutes: 3
        with:
          name: minikube_binaries
          path: out
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        timeout-minutes: 1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        timeout-minutes: 1
        with:
          go-version: ${{env.GO_VERSION}}
      - name: Install libvirt
        timeout-minutes: 2
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev
      - name: Download Dependencies
        timeout-minutes: 1
        run: go mod download
      - name: Lint
        timeout-minutes: 13
        env:
          TESTSUITE: lintall
        run: make test
        continue-on-error: false
  unit_test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        timeout-minutes: 1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        timeout-minutes: 1
        with:
          go-version: ${{env.GO_VERSION}}
      - name: Install libvirt
        timeout-minutes: 2
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev
      - name: Download Dependencies
        timeout-minutes: 1
        run: go mod download
      - name: Unit Test
        timeout-minutes: 9
        env:
          TESTSUITE: unittest
        run: make test
        continue-on-error: false
