name: "ISO Build"
on:
  pull_request:
    types: [labeled, synchronize, reopened]

env:
  GOPROXY: https://proxy.golang.org
  GO_VERSION: '1.25.5'

jobs:
  build-iso:
    if: contains(github.event.pull_request.labels.*.name, 'ok-to-build-iso')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
            os: ubuntu-latest
          - arch: aarch64
            goarch: arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: medyagh/info-block@v1
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
        with:
          go-version: ${{env.GO_VERSION}}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git wget cpio python3 unzip bc gcc automake libtool gnupg2 \
            p7zip-full locales rsync cmake dumb-init libpcre3-dev genisoimage
          
          if [ "${{ matrix.goarch }}" == "amd64" ]; then
            sudo apt-get install -y gcc-multilib
          fi
      - name: Setup ISO Version
        id: iso-version
        run: |
          IV=$(grep -E "ISO_VERSION \?=" Makefile | cut -d " " -f 3 | cut -d "-" -f 1)
          echo "ISO_VERSION=${IV}-$(date +%s)-${{ github.event.number }}" >> $GITHUB_ENV
      - name: Generate Changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./hack/jenkins/build_changelog.sh deploy/iso/minikube-iso/board/minikube/${{ matrix.arch }}/rootfs-overlay/CHANGELOG
      - name: Cache build directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildroot-ccache
            ~/.cache/go-build
            out/buildroot/output-${{ matrix.arch }}/dl
            out/buildroot/output-${{ matrix.arch }}/share/host-go-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-iso-build
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-iso-build-
      - name: Build ISO
        run: |
          make minikube-iso-${{ matrix.arch }}
      - name: Upload ISO
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: minikube-${{ matrix.goarch }}-${{ env.ISO_VERSION }}.iso
          path: out/minikube-${{ matrix.goarch }}.iso
