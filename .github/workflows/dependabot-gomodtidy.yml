name: "dependabot-gomodtidy"
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "go.mod"
      - "go.sum"

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-gomodtidy:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == 'kubernetes/minikube'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.MINIKUBE_BOT_PAT }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        timeout-minutes: 1
        with:
          go-version-file: 'go.mod'

      - name: Run make gomodtidy
        timeout-minutes: 2
        run: |
          make gomodtidy
          if [[ -n $(git status --porcelain) ]]; then
            git config --global user.name "minikube-bot"
            git config --global user.email "20374350+minikube-bot@users.noreply.github.com"
            git add .
            git commit -m "update go.mod and go.sum"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
