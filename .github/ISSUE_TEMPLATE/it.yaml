name: Italiano
description: Segnala un problema
body:
  - type: textarea
    id: problem
    attributes:
      label: Cosa è successo?
      description: |
        Suggerimento: Aggiungi il flag "--alsologtostderr" al comando per ottenere più log.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Allegare il file di log
      description: |
        Suggerimento: Esegui `minikube logs --file=log.txt` e poi trascina il file `log.txt` nel browser.
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Sistema operativo
      description: Qual è il tuo sistema operativo?
      options:
        - macOS (Default)
        - Windows
        - Ubuntu
        - Redhat/Fedora
        - Other
    validations:
      required: false
  - type: dropdown
    id: driver
    attributes:
      label: Driver
      description: Quale driver stai usando?
      options:
        - N/A
        - Docker
        - Podman
        - Hyper-V
        - KVM2
        - VirtualBox
        - None (Baremetal)
        - SSH
        - VMware
        - Parallels
        - QEMU
        - vfkit
        - krunkit
    validations:
      required: false