name: Bahasa Indonesia
description: Laporkan masalah
body:
  - type: textarea
    id: problem
    attributes:
      label: Apa yang terjadi?
      description: |
        Tips: Tambahkan flag "--alsologtostderr" pada baris perintah untuk mendapatkan lebih banyak log.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Lampirkan file log
      description: |
        Tips: Jalankan `minikube logs --file=log.txt` lalu seret dan jatuhkan file `log.txt` ke peramban.
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Sistem Operasi
      description: Apa sistem operasi Anda?
      options:
        - macOS (Default)
        - Windows
        - Ubuntu
        - Redhat/Fedora
        - Other
    validations:
      required: false
  - type: dropdown
    id: driver
    attributes:
      label: Driver
      description: Driver apa yang Anda gunakan?
      options:
        - N/A
        - Docker
        - Podman
        - Hyper-V
        - KVM2
        - VirtualBox
        - None (Baremetal)
        - SSH
        - VMware
        - Parallels
        - QEMU
        - vfkit
        - krunkit
    validations:
      required: false
