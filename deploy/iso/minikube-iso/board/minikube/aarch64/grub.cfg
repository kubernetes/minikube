set default="0"
set timeout="0"

menuentry "Buildroot" {
  # The console depends on the driver:
  # qemu: console=ttyAMA0
  # vfkit,krunkit: console=hvc0
  # virtualbox: console=tty0 (via the VGA/framebuffer console; the ARM VM
  #   built on VBox's armv8virtual chipset has no ttyAMA0 or hvc0 exposed)
  linux /boot/bzimage console=ttyAMA0 console=hvc0 console=tty0
  initrd /boot/initrd # rootfs
}
