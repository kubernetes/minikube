set default="0"
set timeout="0"

menuentry "Buildroot" {
  # The console depends on the driver:
  # virtualbox: console=tty0 (via the VGA/framebuffer console; the ARM VM
  #   built on VBox's armv8virtual chipset has no ttyAMA0 or hvc0 exposed)
  # qemu: console=ttyAMA0
  # vfkit,krunkit: console=hvc0
  # tty0 is listed first so that for non-virtualbox drivers (where tty0
  # has no backing hardware) the kernel still uses the driver's intended
  # console as /dev/console.
  linux /boot/bzimage console=tty0 console=ttyAMA0 console=hvc0
  initrd /boot/initrd # rootfs
}
